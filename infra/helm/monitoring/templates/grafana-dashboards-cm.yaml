apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kafka
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  kafka-dashboard.json: |
    {
      "title": "Kafka Cluster Overview",
      "uid": "kafka-cluster",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Under-Replicated Partitions",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "sum(kafka_server_replicamanager_underreplicatedpartitions)",
            "legendFormat": "Under-replicated"
          }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Active Controller Count",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{
            "expr": "sum(kafka_controller_kafkacontroller_activecontrollercount)",
            "legendFormat": "Active Controllers"
          }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Messages In Per Sec (by topic)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum by (topic) (rate(kafka_server_brokertopicmetrics_messagesinpersec_total[5m]))",
            "legendFormat": "{{ "{{" }}topic{{ "}}" }}"
          }]
        },
        {
          "id": 4,
          "title": "Consumer Group Lag",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "sum by (consumergroup, topic) (kafka_consumergroup_lag)",
            "legendFormat": "{{ "{{" }}consumergroup{{ "}}" }} / {{ "{{" }}topic{{ "}}" }}"
          }]
        },
        {
          "id": 5,
          "title": "Bytes In Per Sec",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "sum by (topic) (rate(kafka_server_brokertopicmetrics_bytesinpersec_total[5m]))",
            "legendFormat": "{{ "{{" }}topic{{ "}}" }}"
          }]
        },
        {
          "id": 6,
          "title": "Bytes Out Per Sec",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{
            "expr": "sum by (topic) (rate(kafka_server_brokertopicmetrics_bytesoutpersec_total[5m]))",
            "legendFormat": "{{ "{{" }}topic{{ "}}" }}"
          }]
        },
        {
          "id": 7,
          "title": "JVM Heap Used",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 20},
          "targets": [{
            "expr": "jvm_memory_bytes_used{area=\"HeapMemoryUsage\",namespace=\"kafka\"}",
            "legendFormat": "{{ "{{" }}pod{{ "}}" }}"
          }]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgres
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  postgres-dashboard.json: |
    {
      "title": "PostgreSQL Overview",
      "uid": "postgres-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Active Connections",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "cnpg_pg_stat_activity_count{state=\"active\"}",
            "legendFormat": "Active"
          }]
        },
        {
          "id": 2,
          "title": "Database Size",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{
            "expr": "cnpg_pg_database_size_bytes",
            "legendFormat": "{{ "{{" }}datname{{ "}}" }}"
          }],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 3,
          "title": "Replication Lag (bytes)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "cnpg_pg_replication_lag",
            "legendFormat": "Lag"
          }]
        },
        {
          "id": 4,
          "title": "WAL Segments Written",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "rate(cnpg_pg_stat_bgwriter_buffers_alloc_total[5m])",
            "legendFormat": "Buffers alloc/s"
          }]
        },
        {
          "id": 5,
          "title": "Transactions per Second",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "sum by (datname) (rate(cnpg_pg_stat_database_xact_commit_total[5m]) + rate(cnpg_pg_stat_database_xact_rollback_total[5m]))",
            "legendFormat": "{{ "{{" }}datname{{ "}}" }}"
          }]
        },
        {
          "id": 6,
          "title": "Cache Hit Ratio",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{
            "expr": "rate(cnpg_pg_stat_database_blks_hit_total[5m]) / (rate(cnpg_pg_stat_database_blks_hit_total[5m]) + rate(cnpg_pg_stat_database_blks_read_total[5m]))",
            "legendFormat": "{{ "{{" }}datname{{ "}}" }}"
          }]
        }
      ]
    }
