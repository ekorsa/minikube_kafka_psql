# PodMonitor for Strimzi Kafka JMX metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: strimzi-kafka
  namespace: {{ .Values.namespace }}
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.kafkaNamespace }}
  selector:
    matchLabels:
      strimzi.io/kind: Kafka
  podMetricsEndpoints:
    - path: /metrics
      port: tcp-prometheus
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
---
