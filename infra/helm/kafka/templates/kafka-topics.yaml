{{- range .Values.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ .name | replace "." "-" }}
  namespace: {{ $.Values.namespace }}
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  topicName: {{ .name }}
  partitions: {{ .partitions }}
  replicas: {{ $.Values.topicReplicationFactor }}
  config:
    {{- range $k, $v := .config }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
{{- end }}
